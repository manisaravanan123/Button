<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bootstrap Color Buttons</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <div class="container text-center mt-5">
    <h1 class="mb-4">Bootstrap Color Buttons</h1>

    <!-- Buttons -->
    <button class="btn btn-primary m-2">Primary</button>
    <button class="btn btn-secondary m-2">Secondary</button>
    <button class="btn btn-success m-2">Success</button>
    <button class="btn btn-danger m-2">Danger</button>
    <button class="btn btn-warning m-2">Warning</button>
    <button class="btn btn-info m-2">Info</button>
    <button class="btn btn-light m-2">Light</button>
    <button class="btn btn-dark m-2">Dark</button>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
